[profile.default]
src = "src"
out = "out"
libs = ["../lib"]
solc_version = "0.8.27"
optimizer = true
optimizer_runs = 100  # 100 keeps Honk verifier under EIP-170 24KB
evm_version = "cancun"
remappings = [
  "@openzeppelin/contracts/=../lib/openzeppelin-contracts/contracts/",
  "forge-std/=../lib/forge-std/src/",
]
fs_permissions = [{ access = "read", path = "./test/fixtures" }]
